<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Medini Welfare Society</title>
<meta name="description" content="Field notes, program updates and impact stories from across Medini Welfare Society's education, health and livelihood programs.">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="header-mount"></div>

<section class="page-head">
  <div class="wrap">
    <span class="eyebrow" data-i18n="nav.blog">Blog</span>
    <h1 data-i18n="blog.heading">Stories and Updates </h1>
    <p class="lead muted" style="max-width:60ch;" data-i18n="blog.lead">Field notes, program updates and impact stories from across our work.</p>
  </div>
</section>

<section class="section">
  <div class="wrap">
    <div class="grid-3" id="post-list"></div>
  </div>
</section>

<div id="footer-mount"></div>
<script src="js/site.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>
<script>
  mountChrome('blog');

  let currentPosts = null;

  function renderPosts(posts){
    currentPosts = posts;
    posts.sort((a,b) => new Date(b.date) - new Date(a.date));
    document.getElementById('post-list').innerHTML = posts.map(p => `
      <div class="card post-card">
        <img src="${p.image}" alt="${t(p, 'title')}">
        <div class="meta"><span>${fmtDate(p.date)}</span><span>${p.category}</span><span>By ${p.author}</span></div>
        <h3><a href="post.html?slug=${p.slug}">${t(p, 'title')}</a></h3>
        <p class="muted">${t(p, 'excerpt')}</p>
        <a href="post.html?slug=${p.slug}" class="btn-ghost">${tt('common.readStory') || 'Read story →'}</a>
      </div>
    `).join('');
  }

  // Re-render with the other language's fields when the header's language switch is used.
  document.addEventListener('medini:langchange', () => { if(currentPosts) renderPosts(currentPosts); });

  // Posts come from Firestore only (created/edited/deleted via admin.html).
  // No static-JSON fallback — an empty database means an empty list, so
  // deleting a post here always actually removes it from the site.
  fetchPostsFromDB()
    .then(dbPosts => {
      if(dbPosts.length === 0){
        document.getElementById('post-list').innerHTML = '<p class="muted">No posts yet — check back soon.</p>';
        return;
      }
      renderPosts(dbPosts);
    })
    .catch(()=>{ document.getElementById('post-list').innerHTML = '<p class="muted">Could not load posts.</p>'; });
</script>
</body>
</html>
