<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post — Medini Welfare Society</title>
<meta name="description" content="A story from Medini Welfare Society's blog." id="metaDescription">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="header-mount"></div>

<section class="section" id="post-content">
  <div class="wrap post-body">
    <p class="muted">Loading…</p>
  </div>
</section>

<div id="footer-mount"></div>
<script src="js/site.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>
<script>
  mountChrome('blog');

  let currentPost = null;

  function renderPost(p){
    currentPost = p;
    document.title = t(p, 'title') + ' — Medini Welfare Society';
    const metaDesc = document.getElementById('metaDescription');
    if(metaDesc && t(p, 'excerpt')) metaDesc.setAttribute('content', t(p, 'excerpt'));
    document.querySelector('#post-content .wrap').innerHTML = `
      <span class="eyebrow">${p.category}</span>
      <h1>${t(p, 'title')}</h1>
      <p class="post-hero-meta">${fmtDate(p.date)} · By ${p.author}</p>
      <img src="${p.image}" alt="${t(p, 'title')}">
      ${t(p, 'body')}
      <div class="mt-40"><a href="blog.html" class="btn btn-outline">← Back to blog</a></div>
    `;
  }

  // Re-render with the other language's fields when the header's language switch is used,
  // without re-fetching from Firestore.
  document.addEventListener('medini:langchange', () => { if(currentPost) renderPost(currentPost); });

  const slug = new URLSearchParams(location.search).get('slug');

  fetchPostBySlugFromDB(slug)
    .then(p => {
      if(p) return renderPost(p);
      return loadJSON('data/blog.json').then(posts => renderPost(posts.find(x => x.slug === slug) || posts[0]));
    })
    .catch(() => loadJSON('data/blog.json').then(posts => renderPost(posts.find(x => x.slug === slug) || posts[0])))
    .catch(()=>{
      document.querySelector('#post-content .wrap').innerHTML = '<p class="muted">Could not load this post.</p>';
    });
</script>
</body>
</html>
