<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Key Personnel — Medini Welfare Society</title>
<meta name="description" content="Meet the board and program leads behind Medini Welfare Society's education, health and livelihood programs.">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="header-mount"></div>

<section class="page-head">
  <div class="wrap">
    <span class="eyebrow">People</span>
    <h1>The people behind the work.</h1>
    <p class="lead muted" style="max-width:60ch;">Our board and program leads bring decades of combined experience in education, healthcare and community development.</p>
  </div>
</section>

<section class="section">
  <div class="wrap">
    <div class="grid-3" id="team-list"></div>
  </div>
</section>

<div id="footer-mount"></div>
<script src="js/site.js"></script>
<script>
  mountChrome('team');
  loadJSON('data/team.json').then(people => {
    document.getElementById('team-list').innerHTML = people.map(p => `
      <div class="person">
        <img src="${p.photo}" alt="${p.name}">
        <h3>${p.name}</h3>
        <span class="role">${p.role}</span>
        <p>${p.bio}</p>
        ${p.linkedin ? `<a href="${p.linkedin}" class="btn-ghost" target="_blank" rel="noopener">LinkedIn →</a>` : ''}
      </div>
    `).join('');
  }).catch(()=>{ document.getElementById('team-list').innerHTML = '<p class="muted">Could not load team.</p>'; });
</script>
</body>
</html>
