<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Initiative — Medini Welfare Society</title>
<meta name="description" content="Read about one of Medini Welfare Society's community programs." id="metaDescription">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="header-mount"></div>
<section class="section" id="initiative-content">
  <div class="wrap post-body">
    <p class="muted">Loading…</p>
  </div>
</section>
<div id="footer-mount"></div>
<script src="js/site.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>
<script>
  mountChrome('initiatives');
  const slug = new URLSearchParams(location.search).get('slug');

  let currentInitiative = null;

  function renderInitiative(it){
    currentInitiative = it;
    document.title = t(it, 'title') + ' — Medini Welfare Society';
    const metaDesc = document.getElementById('metaDescription');
    if(metaDesc && t(it, 'summary')) metaDesc.setAttribute('content', t(it, 'summary'));
    document.querySelector('#initiative-content .wrap').innerHTML = `
      <span class="eyebrow">${it.category} · ${it.status}</span>
      <h1>${t(it, 'title')}</h1>
      <img src="${it.image}" alt="${t(it, 'title')}">
      <p style="font-size:1.1rem;">${t(it, 'summary')}</p>
      ${t(it, 'detail')}
      <div class="mt-40">
        <a href="donate.html" class="btn btn-primary">${tt('initiative.supportBtn') || 'Support this initiative'}</a>
        <a href="initiatives.html" class="btn btn-outline" style="margin-left:12px;">${tt('initiative.allInitiatives') || '← All initiatives'}</a>
      </div>
    `;
  }

  // Re-render with the other language's fields when the header's language switch is used.
  document.addEventListener('medini:langchange', () => { if(currentInitiative) renderInitiative(currentInitiative); });

  // Firestore only — if an initiative was deleted from admin, its page
  // correctly stops resolving instead of falling back to stale static content.
  fetchInitiativeBySlugFromDB(slug)
    .then(it => {
      if(it) return renderInitiative(it);
      document.querySelector('#initiative-content .wrap').innerHTML = '<p class="muted">Could not load this initiative.</p>';
    })
    .catch(()=>{
      document.querySelector('#initiative-content .wrap').innerHTML = '<p class="muted">Could not load this initiative.</p>';
    });
</script>
</body>
</html>
