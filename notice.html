<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notice — Medini Welfare Society</title>
<meta name="description" content="An announcement from Medini Welfare Society." id="metaDescription">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="header-mount"></div>

<section class="section" id="notice-content">
  <div class="wrap post-body">
    <p class="muted">Loading…</p>
  </div>
</section>

<div id="footer-mount"></div>
<script src="js/site.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>
<script>
  mountChrome('notices');

  let currentNotice = null;

  function renderNotice(n){
    currentNotice = n;
    document.title = t(n, 'headline') + ' — Medini Welfare Society';
    const metaDesc = document.getElementById('metaDescription');
    const bodyText = t(n, 'body');
    if(metaDesc && bodyText){
      const div = document.createElement('div');
      div.innerHTML = bodyText;
      const text = (div.textContent || div.innerText || '').trim();
      if(text) metaDesc.setAttribute('content', text.length > 160 ? text.slice(0,160).trim() + '…' : text);
    }
    document.querySelector('#notice-content .wrap').innerHTML = `
      <span class="eyebrow">Notice</span>
      <h1>${t(n, 'headline')}</h1>
      <p class="post-hero-meta">${fmtDate(n.date)}</p>
      ${bodyText}
      <div class="mt-40"><a href="notices.html" class="btn btn-outline">← All notices</a></div>
    `;
  }

  // Re-render with the other language's fields when the header's language switch is used.
  document.addEventListener('medini:langchange', () => { if(currentNotice) renderNotice(currentNotice); });

  const slug = new URLSearchParams(location.search).get('slug');

  fetchNoticeBySlugFromDB(slug)
    .then(n => {
      if(n) return renderNotice(n);
      document.querySelector('#notice-content .wrap').innerHTML = '<p class="muted">Could not load this notice.</p>';
    })
    .catch(()=>{
      document.querySelector('#notice-content .wrap').innerHTML = '<p class="muted">Could not load this notice.</p>';
    });
</script>
</body>
</html>
