<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Initiatives — Medini Welfare Society</title>
<meta name="description" content="Explore Medini Welfare Society's programs — from after-school learning centers to emergency relief — each built around what each community needs.">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="header-mount"></div>

<section class="page-head">
  <div class="wrap">
    <span class="eyebrow" data-i18n="initiatives.eyebrow">Our Work</span>
    <h1 data-i18n="initiatives.heading">Programs built around what each community needs.</h1>
    <p class="lead muted" style="max-width:60ch;" data-i18n="initiatives.lead">From after-school learning centers to emergency relief, every initiative is designed with — not just for — the community it serves.</p>
  </div>
</section>

<section class="section">
  <div class="wrap">
    <div class="flex-gap" id="filters" style="margin-bottom:30px;"></div>
    <div class="grid-3" id="initiative-list"></div>
  </div>
</section>

<div id="footer-mount"></div>
<script src="js/site.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>
<script>
  mountChrome('initiatives');

  let currentItems = null;
  let currentCat = 'All';

  function renderList(items){
    currentItems = items;
    const cats = ['All', ...new Set(items.map(i => i.category))];
    const filters = document.getElementById('filters');
    const list = document.getElementById('initiative-list');

    function render(cat){
      currentCat = cat;
      const filtered = cat === 'All' ? items : items.filter(i => i.category === cat);
      list.innerHTML = filtered.map(it => `
        <div class="card">
          <img src="${it.image}" alt="${t(it, 'title')}">
          <div class="flex-gap"><span class="tag">${it.category}</span><span class="tag" style="background:transparent;border:1px solid var(--rule);">${it.status}</span></div>
          <h3>${t(it, 'title')}</h3>
          <p class="muted">${t(it, 'summary')}</p>
          <a href="initiative.html?slug=${it.slug}" class="btn-ghost">${tt('common.readMore') || 'Read more →'}</a>
        </div>
      `).join('');
    }

    filters.innerHTML = cats.map(c => `<button class="btn btn-outline filter-btn" data-cat="${c}" style="padding:8px 18px;font-size:.85rem;">${c}</button>`).join('');
    filters.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => render(btn.dataset.cat));
    });
    render(currentCat);
  }

  // Re-render with the other language's fields when the header's language switch is used,
  // keeping whichever category filter was already selected.
  document.addEventListener('medini:langchange', () => { if(currentItems) renderList(currentItems); });

  // Initiatives come from Firestore only (created/edited/deleted via admin.html).
  // No static-JSON fallback — an empty database means an empty list, so
  // deleting an initiative here always actually removes it from the site.
  fetchInitiativesFromDB()
    .then(dbItems => {
      if(dbItems.length === 0){
        document.getElementById('initiative-list').innerHTML = '<p class="muted">No initiatives posted yet.</p>';
        return;
      }
      renderList(dbItems);
    })
    .catch(()=>{ document.getElementById('initiative-list').innerHTML = '<p class="muted">Could not load initiatives.</p>'; });
</script>
</body>
</html>
